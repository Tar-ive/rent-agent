name = "rent-agent-telegram"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# No static assets — this is a pure API worker
# assets = { directory = "./public" }

[build]
command = "npm install"

# KV namespace for multi-user session storage.
[[kv_namespaces]]
binding = "USERS"
id = "28e6fbf67cf24ac09becedcb6c344a54"

# Secrets (set via Cloudflare dashboard or CLI):
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put GITHUB_REPO
#   npx wrangler secret put BROWSERBASE_API_KEY
#   npx wrangler secret put BROWSERBASE_PROJECT_ID

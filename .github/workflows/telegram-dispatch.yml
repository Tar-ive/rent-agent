name: Telegram Bot Dispatch

on:
  repository_dispatch:
    types: [pest_control, maintenance_request]

jobs:
  process-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pest control
        if: github.event.action == 'pest_control'
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          RENTCAFE_EMAIL: ${{ secrets.RENTCAFE_EMAIL }}
          RENTCAFE_URL: ${{ secrets.RENTCAFE_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_OTP_SENDER: ${{ secrets.GMAIL_OTP_SENDER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx src/pest-control.ts

      - name: Run maintenance request
        if: github.event.action == 'maintenance_request'
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          RENTCAFE_EMAIL: ${{ secrets.RENTCAFE_EMAIL }}
          RENTCAFE_URL: ${{ secrets.RENTCAFE_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_OTP_SENDER: ${{ secrets.GMAIL_OTP_SENDER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REQUEST_DESCRIPTION: ${{ github.event.client_payload.description }}
        run: npx tsx src/maintenance-dispatch.ts

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Work order automation failed. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

name: Telegram Bot Poll

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  poll-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: .telegram-state.json
          key: telegram-state-${{ github.run_id }}
          restore-keys: telegram-state-

      - name: Poll and process messages
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          RENTCAFE_EMAIL: ${{ secrets.RENTCAFE_EMAIL }}
          RENTCAFE_URL: ${{ secrets.RENTCAFE_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_OTP_SENDER: ${{ secrets.GMAIL_OTP_SENDER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx src/telegram-bot.ts

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .telegram-state.json
          key: telegram-state-${{ github.run_id }}
